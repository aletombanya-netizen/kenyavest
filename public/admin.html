<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - KenyaVest</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #0B1120; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
    .header { background-color: #1A2235; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(244,196,48,0.2); }
    .header h1 { margin: 0; color: #F4C430; font-size: 1.5rem; }
    .logout-btn { background: transparent; border: 1px solid #F4C430; color: #F4C430; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
    .logout-btn:hover { background: #F4C430; color: #000; }
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    .card { background-color: #1A2235; padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .card h2 { margin-top: 0; color: #F4C430; margin-bottom: 20px;}
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #333; }
    th { background-color: #242f47; color: #aaa; font-weight: 500; text-transform: uppercase; font-size: 0.85rem; }
    tr:hover { background-color: #242f47; }
    
    .btn-sm { padding: 5px 10px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 0.8rem; margin-right: 5px; }
    .btn-approve { background: #4ade80; color: #000; }
    .btn-reject { background: #f87171; color: #000; }
    
    .status-success { color: #4ade80; }
    .status-pending { color: #F4C430; }
    .status-failed { color: #f87171; }
  </style>
</head>
<body>

<div class="header">
  <h1>KenyaVest <span style="font-size: 1rem; color: #aaa;">[Admin Panel]</span></h1>
  <div style="display: flex; align-items: center; gap: 15px;">
    <span id="adminNameDisplay">Welcome, Admin</span>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="container">
  <div id="errorMsg" style="color: #f87171; text-align: center; margin-bottom: 20px;"></div>

  <div class="card">
    <h2>Pending Withdrawals & Deposits</h2>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>User</th>
            <th>Type</th>
            <th>Amount (KES)</th>
            <th>Reference</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="transactionsTableBody">
          <tr><td colspan="7">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>All Users</h2>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Role</th>
            <th>Balance (KES)</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
