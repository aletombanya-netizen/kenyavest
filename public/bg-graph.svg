<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" preserveAspectRatio="xMidYMid slice">

  <!-- Chart Grid -->
  <g stroke="#00E5C3" stroke-width="0.8" opacity="0.10">
    <line x1="0" y1="100" x2="1400" y2="100"/>
    <line x1="0" y1="200" x2="1400" y2="200"/>
    <line x1="0" y1="300" x2="1400" y2="300"/>
    <line x1="0" y1="400" x2="1400" y2="400"/>
    <line x1="0" y1="500" x2="1400" y2="500"/>
    <line x1="0" y1="600" x2="1400" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="700"/>
    <line x1="400" y1="0" x2="400" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/>
    <line x1="800" y1="0" x2="800" y2="700"/>
    <line x1="1000" y1="0" x2="1000" y2="700"/>
    <line x1="1200" y1="0" x2="1200" y2="700"/>
  </g>

  <!-- Trend area fill (rising) -->
  <polygon
    points="0,650 200,560 400,475 600,375 800,295 1000,215 1200,155 1400,95 1400,700 0,700"
    fill="#00BFA5" opacity="0.06"/>

  <!-- Primary trend line -->
  <polyline
    points="0,650 200,560 400,475 600,375 800,295 1000,215 1200,155 1400,95"
    fill="none" stroke="#00E5C3" stroke-width="2.5" opacity="0.20"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Secondary dashed trend line -->
  <polyline
    points="0,590 200,530 400,548 600,465 800,428 1000,355 1200,318 1400,268"
    fill="none" stroke="#4DD0E1" stroke-width="1.5" opacity="0.12"
    stroke-dasharray="9,6" stroke-linecap="round"/>

  <!-- Data points on primary trend line -->
  <g fill="#00E5C3" opacity="0.28">
    <circle cx="0"    cy="650" r="4"/>
    <circle cx="200"  cy="560" r="4"/>
    <circle cx="400"  cy="475" r="4"/>
    <circle cx="600"  cy="375" r="4"/>
    <circle cx="800"  cy="295" r="4"/>
    <circle cx="1000" cy="215" r="4"/>
    <circle cx="1200" cy="155" r="4"/>
    <circle cx="1400" cy="95"  r="4"/>
  </g>

  <!-- Candlestick Group – Left -->
  <g opacity="0.18">
    <line x1="220" y1="516" x2="220" y2="490" stroke="#00E5C3" stroke-width="1.5"/>
    <rect x="214" y="490" width="12" height="42" fill="#00E5C3" rx="1.5"/>
    <line x1="220" y1="532" x2="220" y2="552" stroke="#00E5C3" stroke-width="1.5"/>

    <line x1="260" y1="472" x2="260" y2="452" stroke="#FF6B6B" stroke-width="1.5"/>
    <rect x="254" y="452" width="12" height="32" fill="#FF6B6B" rx="1.5"/>
    <line x1="260" y1="484" x2="260" y2="504" stroke="#FF6B6B" stroke-width="1.5"/>

    <line x1="300" y1="444" x2="300" y2="418" stroke="#00E5C3" stroke-width="1.5"/>
    <rect x="294" y="418" width="12" height="36" fill="#00E5C3" rx="1.5"/>
    <line x1="300" y1="454" x2="300" y2="472" stroke="#00E5C3" stroke-width="1.5"/>

    <line x1="340" y1="412" x2="340" y2="388" stroke="#00E5C3" stroke-width="1.5"/>
    <rect x="334" y="388" width="12" height="36" fill="#00E5C3" rx="1.5"/>
    <line x1="340" y1="424" x2="340" y2="442" stroke="#00E5C3" stroke-width="1.5"/>

    <line x1="380" y1="374" x2="380" y2="352" stroke="#FF6B6B" stroke-width="1.5"/>
    <rect x="374" y="352" width="12" height="30" fill="#FF6B6B" rx="1.5"/>
    <line x1="380" y1="382" x2="380" y2="400" stroke="#FF6B6B" stroke-width="1.5"/>
  </g>

  <!-- Candlestick Group – Mid -->
  <g opacity="0.18">
    <line x1="620" y1="348" x2="620" y2="322" stroke="#00E5C3" stroke-width="1.5"/>
    <rect x="614" y="322" width="12" height="36" fill="#00E5C3" rx="1.5"/>
    <line x1="620" y1="358" x2="620" y2="376" stroke="#00E5C3" stroke-width="1.5"/>

    <line x1="660" y1="318" x2="660" y2="293" stroke="#00E5C3" stroke-width="1.5"/>
    <rect x="654" y="293" width="12" height="33" fill="#00E5C3" rx="1.5"/>
    <line x1="660" y1="326" x2="660" y2="345" stroke="#00E5C3" stroke-width="1.5"/>

    <line x1="700" y1="308" x2="700" y2="287" stroke="#FF6B6B" stroke-width="1.5"/>
    <rect x="694" y="287" width="12" height="29" fill="#FF6B6B" rx="1.5"/>
    <line x1="700" y1="316" x2="700" y2="334" stroke="#FF6B6B" stroke-width="1.5"/>

    <line x1="740" y1="292" x2="740" y2="263" stroke="#00E5C3" stroke-width="1.5"/>
    <rect x="734" y="263" width="12" height="39" fill="#00E5C3" rx="1.5"/>
    <line x1="740" y1="302" x2="740" y2="320" stroke="#00E5C3" stroke-width="1.5"/>
  </g>

  <!-- Candlestick Group – Right -->
  <g opacity="0.18">
    <line x1="1020" y1="228" x2="1020" y2="203" stroke="#00E5C3" stroke-width="1.5"/>
    <rect x="1014" y="203" width="12" height="33" fill="#00E5C3" rx="1.5"/>
    <line x1="1020" y1="236" x2="1020" y2="254" stroke="#00E5C3" stroke-width="1.5"/>

    <line x1="1060" y1="212" x2="1060" y2="188" stroke="#00E5C3" stroke-width="1.5"/>
    <rect x="1054" y="188" width="12" height="31" fill="#00E5C3" rx="1.5"/>
    <line x1="1060" y1="219" x2="1060" y2="238" stroke="#00E5C3" stroke-width="1.5"/>

    <line x1="1100" y1="198" x2="1100" y2="176" stroke="#FF6B6B" stroke-width="1.5"/>
    <rect x="1094" y="176" width="12" height="28" fill="#FF6B6B" rx="1.5"/>
    <line x1="1100" y1="204" x2="1100" y2="224" stroke="#FF6B6B" stroke-width="1.5"/>

    <line x1="1140" y1="185" x2="1140" y2="160" stroke="#00E5C3" stroke-width="1.5"/>
    <rect x="1134" y="160" width="12" height="35" fill="#00E5C3" rx="1.5"/>
    <line x1="1140" y1="195" x2="1140" y2="215" stroke="#00E5C3" stroke-width="1.5"/>
  </g>

  <!-- Volume Bar Chart – Bottom strip -->
  <g opacity="0.10" fill="#00BFA5">
    <rect x="212" y="652" width="18" height="35" rx="2"/>
    <rect x="252" y="642" width="18" height="45" rx="2"/>
    <rect x="292" y="648" width="18" height="39" rx="2"/>
    <rect x="332" y="632" width="18" height="55" rx="2"/>
    <rect x="372" y="657" width="18" height="30" rx="2"/>
    <rect x="612" y="642" width="18" height="45" rx="2"/>
    <rect x="652" y="630" width="18" height="57" rx="2"/>
    <rect x="692" y="650" width="18" height="37" rx="2"/>
    <rect x="732" y="623" width="18" height="64" rx="2"/>
    <rect x="1012" y="647" width="18" height="40" rx="2"/>
    <rect x="1052" y="628" width="18" height="59" rx="2"/>
    <rect x="1092" y="640" width="18" height="47" rx="2"/>
    <rect x="1132" y="620" width="18" height="67" rx="2"/>
  </g>

  <!-- Floating % labels -->
  <g font-family="'Courier New', monospace" font-size="13" fill="#00E5C3" opacity="0.14">
    <text x="416" y="460">+5.2%</text>
    <text x="816" y="280">+12.4%</text>
    <text x="1016" y="200">+8.7%</text>
  </g>

  <!-- Decorative donut / pie chart – Top right -->
  <circle cx="1320" cy="185" r="58" fill="none" stroke="#00E5C3"
    stroke-width="14" stroke-dasharray="242 122" opacity="0.09"/>
  <circle cx="1320" cy="185" r="58" fill="none" stroke="#4DD0E1"
    stroke-width="14" stroke-dasharray="80 284" stroke-dashoffset="-242" opacity="0.07"/>
  <circle cx="1320" cy="185" r="58" fill="none" stroke="#80CBC4"
    stroke-width="14" stroke-dasharray="42 322" stroke-dashoffset="-322" opacity="0.05"/>

  <!-- Small sparkline – top left corner -->
  <polyline
    points="30,80 60,65 90,72 120,50 150,38 180,44 210,28 240,15"
    fill="none" stroke="#00E5C3" stroke-width="1.8" opacity="0.16"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="240" cy="15" r="3" fill="#00E5C3" opacity="0.22"/>

</svg>
