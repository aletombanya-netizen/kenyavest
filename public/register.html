<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - KenyaVest</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #0B1120; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .auth-container { background-color: #1A2235; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(244,196,48,0.2); }
    .auth-container h2 { text-align: center; color: #F4C430; margin-top: 0; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background-color: #0B1120; color: #fff; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: #F4C430; }
    .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #F4C430, #D4A017); color: #000; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn:hover { box-shadow: 0 0 15px rgba(244,196,48,0.5); }
    .auth-links { text-align: center; margin-top: 20px; font-size: 0.9rem; }
    .auth-links a { color: #F4C430; text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }
    #errorMsg { color: #ff4c4c; text-align: center; margin-bottom: 15px; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>

<div class="auth-container">
  <h2>Create Account</h2>
  <div id="errorMsg"></div>
  <div id="registerSection">
    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="e.g. 0712345678" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Sign Up</button>
    </form>
    <div class="auth-links">
      Already have an account? <a href="/login.html">Login</a>
    </div>
  </div>

  <div id="otpSection" style="display: none;">
    <p style="text-align: center; margin-bottom: 20px;">Enter the 6-digit OTP sent to your phone. Check the Render logs during testing.</p>
    <form id="otpForm">
      <div class="form-group">
        <label for="otpCode">OTP Code</label>
        <input type="text" id="otpCode" maxlength="6" placeholder="Enter 6-digit code" style="font-size:22px;letter-spacing:8px;text-align:center" required>
      </div>
      <button type="submit" class="btn">Verify Phone</button>
    </form>
    <div class="auth-links">
      Didn't get the code? <a href="#" id="resendOtpBtn">Resend OTP</a><br><br>
      <a href="/register.html">Back to Registration</a>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
