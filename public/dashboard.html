<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - KenyaVest</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #0B1120; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
    .header { background-color: #1A2235; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(244,196,48,0.2); }
    .header h1 { margin: 0; color: #F4C430; font-size: 1.5rem; }
    .logout-btn { background: transparent; border: 1px solid #F4C430; color: #F4C430; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
    .logout-btn:hover { background: #F4C430; color: #000; }
    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
    .card { background-color: #1A2235; padding: 30px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .card h2 { margin-top: 0; color: #F4C430; }
    .balance-display { font-size: 2.5rem; font-weight: bold; margin: 20px 0; }
    .action-buttons { display: flex; gap: 10px; }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-primary { background: linear-gradient(135deg, #F4C430, #D4A017); color: #000; }
    .btn-primary:hover { box-shadow: 0 0 15px rgba(244,196,48,0.5); }
    
    /* Deposit Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
    .modal-content { background: #1A2235; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid rgba(244,196,48,0.2); }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
    .form-group input { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px; background-color: #0B1120; color: #fff; box-sizing: border-box; }
    .close-modal { float: right; cursor: pointer; color: #aaa; font-size: 1.5rem; }
    
    .transaction-list { list-style: none; padding: 0; }
    .transaction-list li { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #333; }
    .status-success { color: #4ade80; }
    .status-pending { color: #F4C430; }
    .status-failed { color: #f87171; }
  </style>
</head>
<body>

<div class="header">
  <h1>KenyaVest</h1>
  <div style="display: flex; align-items: center; gap: 15px;">
    <span id="userNameDisplay">Welcome, User</span>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Available Balance</h2>
    <div class="balance-display">KES <span id="balanceAmount">0.00</span></div>
    <div class="action-buttons">
      <button class="btn btn-primary" id="openDepositModal">Deposit via M-Pesa</button>
      <button class="btn btn-primary" style="background: transparent; border: 1px solid #F4C430; color: #F4C430;">Withdraw</button>
    </div>
  </div>

  <div class="card">
    <h2>Recent Transactions</h2>
    <ul class="transaction-list" id="transactionList">
      <li>Loading...</li>
    </ul>
  </div>
</div>

<!-- Deposit Modal -->
<div class="modal" id="depositModal">
  <div class="modal-content">
    <span class="close-modal" id="closeModal">&times;</span>
    <h2 style="margin-top: 0; color: #F4C430;">M-Pesa Deposit</h2>
    <form id="depositForm">
      <div class="form-group">
        <label for="depositAmount">Amount (KES)</label>
        <input type="number" id="depositAmount" min="10" placeholder="e.g. 1000" required>
      </div>
      <div class="form-group">
        <label for="depositPhone">M-Pesa Phone Number</label>
        <input type="text" id="depositPhone" placeholder="e.g. 0712345678" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Initiate Payment</button>
    </form>
    <div id="depositMsg" style="margin-top: 15px; font-size: 0.9rem; text-align: center;"></div>
  </div>
</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
